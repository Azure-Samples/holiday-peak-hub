defaultEnvironment: dev
environments:
  dev:
    projectEndpoint: ${PROJECT_ENDPOINT}
    agentName: product-management-acp-transformation
    azureContainerRegistry: ${AZURE_CONTAINER_REGISTRY}
    observability:
      applicationInsightsConnectionString: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
      tracingBackend: application-insights
    evaluationSuites:
      - id: product-management-acp-transformation-smoke
        name: Product Management ACP Transformation Smoke Evaluation
        tags:
          tier: smoke
          purpose: portal-tracking
          stage: seed
        dataset: product-management-acp-transformation-eval-seed
        datasetVersion: v1
        datasetFile: .foundry/datasets/product-management-acp-transformation-eval-seed-v1.jsonl
        evaluators:
          - name: coherence
            threshold: 4
          - name: groundedness
            threshold: 4
