surface:
  type: custom
  classification: Custom Agent
  audience: non-public-internal
  productRuntime: aks
  productTrafficPath: "APIM -> AGC -> AKS"
  foundryManagedCompute: false
  proxy:
    target: existing-aks-apim-endpoint
    endpoint: ${APIM_BASE_URL}/agents/crm-profile-aggregation
defaultEnvironment: dev
environments:
  dev:
    projectEndpoint: ${PROJECT_ENDPOINT}
    agentName: crm-profile-aggregation
    azureContainerRegistry: ${AZURE_CONTAINER_REGISTRY}
    observability:
      applicationInsightsConnectionString: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
      tracingBackend: application-insights
    evaluationSuites:
      - id: crm-profile-aggregation-smoke
        name: CRM Profile Aggregation Smoke Evaluation
        tags:
          tier: smoke
          purpose: portal-tracking
          stage: seed
        dataset: crm-profile-aggregation-eval-seed
        datasetVersion: v1
        datasetFile: .foundry/datasets/crm-profile-aggregation-eval-seed-v1.jsonl
        evaluators:
          - name: coherence
            threshold: 4
          - name: groundedness
            threshold: 4
