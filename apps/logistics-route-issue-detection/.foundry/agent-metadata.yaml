surface:
  type: custom
  classification: Custom Agent
  audience: non-public-internal
  productRuntime: aks
  productTrafficPath: "APIM -> AGC -> AKS"
  foundryManagedCompute: false
  proxy:
    target: existing-aks-apim-endpoint
    endpoint: ${APIM_BASE_URL}/agents/logistics-route-issue-detection
defaultEnvironment: dev
environments:
  dev:
    projectEndpoint: ${PROJECT_ENDPOINT}
    agentName: logistics-route-issue-detection
    azureContainerRegistry: ${AZURE_CONTAINER_REGISTRY}
    observability:
      applicationInsightsConnectionString: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
      tracingBackend: application-insights
    evaluationSuites:
      - id: logistics-route-issue-detection-smoke
        name: Logistics Route Issue Detection Smoke Evaluation
        tags:
          tier: smoke
          purpose: portal-tracking
          stage: seed
        dataset: logistics-route-issue-detection-eval-seed
        datasetVersion: v1
        datasetFile: .foundry/datasets/logistics-route-issue-detection-eval-seed-v1.jsonl
        evaluators:
          - name: coherence
            threshold: 4
          - name: groundedness
            threshold: 4
