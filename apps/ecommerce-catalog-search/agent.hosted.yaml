name: ecommerce-catalog-search
description: >
  Foundry Hosted Agent surface for public catalog discovery and ACP-aligned
  search. It runs the existing FastAPI app and shared Responses adapter;
  AKS remains the product runtime for production traffic.
metadata:
  surface:
    type: hosted
    classification: Hosted Agent
    audience: public-human-facing
    productRuntime: aks
    productTrafficPath: "APIM -> AGC -> AKS"
    replacesProductRuntime: false
  sourceIssue: "990"
template:
  kind: hosted
  startupCommand: "python -m uvicorn ecommerce_catalog_search.main:app --host 0.0.0.0 --port 8088"
  protocols:
    - protocol: responses
      version: "1.0.0"
  environment_variables:
    - name: HPH_AGENT_ID_FAST
      value: ${HPH_AGENT_ID_FAST}
    - name: HPH_AGENT_ID_RICH
      value: ${HPH_AGENT_ID_RICH}
    - name: PROJECT_ENDPOINT
      value: ${PROJECT_ENDPOINT}
    - name: PROJECT_NAME
      value: ${PROJECT_NAME}
    - name: MODEL_DEPLOYMENT_NAME_FAST
      value: ${MODEL_DEPLOYMENT_NAME_FAST}
    - name: MODEL_DEPLOYMENT_NAME_RICH
      value: ${MODEL_DEPLOYMENT_NAME_RICH}
    - name: HOLIDAY_PEAK_FOUNDRY_HOSTED
      value: "1"
    - name: UVICORN_PORT
      value: "8088"
    - name: REDIS_HOST
      value: ${REDIS_HOST}
    - name: REDIS_URL
      value: ${REDIS_URL}
    - name: COSMOS_ACCOUNT_URI
      value: ${COSMOS_ACCOUNT_URI}
    - name: COSMOS_DATABASE
      value: ${COSMOS_DATABASE}
    - name: COSMOS_CONTAINER
      value: ${COSMOS_CONTAINER}
    - name: BLOB_ACCOUNT_URL
      value: ${BLOB_ACCOUNT_URL}
    - name: BLOB_CONTAINER
      value: ${BLOB_CONTAINER}
    - name: EVENT_HUB_NAMESPACE
      value: ${EVENT_HUB_NAMESPACE}
    - name: KEY_VAULT_URI
      value: ${KEY_VAULT_URI}
    - name: APPLICATIONINSIGHTS_CONNECTION_STRING
      value: ${APPLICATIONINSIGHTS_CONNECTION_STRING}