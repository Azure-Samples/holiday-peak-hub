surface:
  type: custom
  classification: Custom Agent
  audience: non-public-internal
  productRuntime: aks
  productTrafficPath: "APIM -> AGC -> AKS"
  foundryManagedCompute: false
  proxy:
    target: existing-aks-apim-endpoint
    endpoint: ${APIM_BASE_URL}/agents/search-enrichment-agent
defaultEnvironment: dev
environments:
  dev:
    projectEndpoint: ${PROJECT_ENDPOINT}
    agentName: search-enrichment-agent
    azureContainerRegistry: ${AZURE_CONTAINER_REGISTRY}
    observability:
      applicationInsightsConnectionString: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
      tracingBackend: application-insights
    evaluationSuites:
      - id: search-enrichment-agent-smoke
        name: Search Enrichment Agent Smoke Evaluation
        tags:
          tier: smoke
          purpose: portal-tracking
          stage: seed
        dataset: search-enrichment-agent-eval-seed
        datasetVersion: v1
        datasetFile: .foundry/datasets/search-enrichment-agent-eval-seed-v1.jsonl
        evaluators:
          - name: coherence
            threshold: 4
          - name: groundedness
            threshold: 4
