# Foundry V3 Hosted Agent registration manifest.
#
# The sibling ``agent.yaml`` is the portal-tracking artifact for the existing
# direct-model FastAPI runtime and is governed by
# ``tests/ops/test_foundry_portal_tracking_manifests.py`` (which mandates
# ``template.kind: direct-model`` and the shared env-var contract for all 26
# agents).
#
# THIS file is the V3 hosted-agent registration manifest \u2014 it is consumed
# only by ``scripts/ops/deploy_hosted_agent.py`` (and
# ``holiday_peak_lib.foundry_hosting.load_manifest``) to call
# ``AIProjectClient.agents.create_version(...)`` against Azure AI Foundry.
# Its schema follows the canonical ``agent.manifest.yaml`` shape from the
# Microsoft ``foundry-samples`` repository.
name: inventory-health-check
description: >
  Inventory health and anomaly signal agent. Runs as a Foundry V3 hosted
  agent: the FastAPI container exposes the Responses protocol at
  ``/responses`` (the gateway adds the public ``/openai/v1/`` prefix) while
  keeping ``/health``, ``/ready`` and ``/mcp/*`` for AKS-style probes and
  agent-to-agent calls.
metadata:
  sourceIssue: "990"
  runtime: foundry-hosted-fastapi
  tags:
    - Holiday Peak Hub
    - Retail
    - Inventory
    - Health Check
    - Foundry Hosted Agent
template:
  name: inventory-health-check
  kind: hosted
  protocols:
    - protocol: responses
      version: "1.0.0"
  environment_variables:
    # The Responses protocol library reads AZURE_AI_MODEL_DEPLOYMENT_NAME
    # for default model lookup. Keep it explicit so a fresh deploy never
    # depends on the operator remembering to set it at the CLI.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{MODEL_DEPLOYMENT_NAME_FAST}}"
    # NOTE: Foundry V3 platform reserves the entire ``FOUNDRY_*`` and
    # ``AGENT_*`` env-var namespaces (per container-image-spec, surfaced as
    # ``ValidationError: Environment variable '<NAME>' is reserved for platform
    # use`` on ``create_version``). The platform itself injects:
    #   FOUNDRY_PROJECT_ENDPOINT, FOUNDRY_PROJECT_ARM_ID,
    #   FOUNDRY_AGENT_NAME, FOUNDRY_AGENT_VERSION, FOUNDRY_AGENT_SESSION_ID,
    #   APPLICATIONINSIGHTS_CONNECTION_STRING.
    # So we must NOT redeclare any of those AND we must NOT use any other
    # ``FOUNDRY_*`` / ``AGENT_*`` name (e.g., ``FOUNDRY_AGENT_ID_FAST``).
    # The container therefore reads SLM/LLM agent IDs from the
    # ``HPH_AGENT_ID_*`` envs below (mapped by
    # ``holiday_peak_lib.app_factory_components.foundry_lifecycle.build_foundry_config``).
    # We still declare PROJECT_ENDPOINT explicitly for ops parity with AKS.
    - name: PROJECT_ENDPOINT
      value: "{{PROJECT_ENDPOINT}}"
    - name: PROJECT_NAME
      value: "{{PROJECT_NAME}}"
    - name: MODEL_DEPLOYMENT_NAME_FAST
      value: "{{MODEL_DEPLOYMENT_NAME_FAST}}"
    - name: MODEL_DEPLOYMENT_NAME_RICH
      value: "{{MODEL_DEPLOYMENT_NAME_RICH}}"
    # ``HPH_AGENT_ID_*`` are the non-reserved equivalents of the legacy AKS
    # ``FOUNDRY_AGENT_ID_*`` contract. ``build_foundry_config`` reads the
    # ``HPH_`` prefix first and falls back to the legacy name for AKS deploys
    # that haven't migrated, keeping ADR-010 back-compat.
    - name: HPH_AGENT_ID_FAST
      value: "{{FOUNDRY_AGENT_ID_FAST}}"
    - name: HPH_AGENT_ID_RICH
      value: "{{FOUNDRY_AGENT_ID_RICH}}"
    - name: REDIS_HOST
      value: "{{REDIS_HOST}}"
    - name: REDIS_URL
      value: "{{REDIS_URL}}"
    - name: COSMOS_ACCOUNT_URI
      value: "{{COSMOS_ACCOUNT_URI}}"
    - name: COSMOS_DATABASE
      value: "{{COSMOS_DATABASE}}"
    - name: COSMOS_CONTAINER
      value: "{{COSMOS_CONTAINER}}"
    - name: BLOB_ACCOUNT_URL
      value: "{{BLOB_ACCOUNT_URL}}"
    - name: BLOB_CONTAINER
      value: "{{BLOB_CONTAINER}}"
    - name: EVENT_HUB_NAMESPACE
      value: "{{EVENT_HUB_NAMESPACE}}"
    - name: KEY_VAULT_URI
      value: "{{KEY_VAULT_URI}}"
    - name: HOLIDAY_PEAK_FOUNDRY_HOSTED
      value: "1"
    # Hosted containers run outside the private AKS VNet. Keep optional
    # private-network dependencies detached from request handling while the
    # AKS deployment continues to use the default framework behavior.
    - name: HOLIDAY_PEAK_HOT_MEMORY_ENABLED
      value: "false"
    - name: HOLIDAY_PEAK_EVENTHUB_SUBSCRIBERS_ENABLED
      value: "false"
    # NOTE: ``PORT`` is also reserved by Foundry V3 hosted-agents (the
    # platform injects it itself when launching the container; declaring it
    # here triggers ``invalid_payload: Environment variable 'PORT' is reserved
    # for platform use``). The Dockerfile CMD already prefers ``PORT`` over
    # ``UVICORN_PORT`` over the framework default 8088, so the platform value
    # wins automatically. We keep ``UVICORN_PORT`` as a non-reserved fallback
    # for local docker-run / AKS dev parity only.
    - name: UVICORN_PORT
      value: "8088"
    # Foundry hosted-agent containers get tight CPU quotas at scale-from-zero,
    # so we run a single uvicorn worker to keep startup well under the
    # readiness deadline. AKS pods override this via Helm.
    - name: WEB_CONCURRENCY
      value: "1"
container:
  cpu: "1"
  memory: 2Gi
resources:
  - kind: model
    id: gpt-5-nano
    name: MODEL_DEPLOYMENT_NAME_FAST
  - kind: model
    id: gpt-5
    name: MODEL_DEPLOYMENT_NAME_RICH
