defaultEnvironment: dev
environments:
  dev:
    projectEndpoint: ${PROJECT_ENDPOINT}
    agentName: inventory-health-check
    azureContainerRegistry: ${AZURE_CONTAINER_REGISTRY}
    observability:
      applicationInsightsConnectionString: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
      tracingBackend: application-insights
    evaluationSuites:
      - id: inventory-health-check-smoke
        name: Inventory Health Check Smoke Evaluation
        tags:
          tier: smoke
          purpose: portal-tracking
          stage: seed
        dataset: inventory-health-check-eval-seed
        datasetVersion: v1
        datasetFile: .foundry/datasets/inventory-health-check-eval-seed-v1.jsonl
        evaluators:
          - name: coherence
            threshold: 4
          - name: groundedness
            threshold: 4
