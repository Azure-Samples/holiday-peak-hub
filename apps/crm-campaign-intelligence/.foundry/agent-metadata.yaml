defaultEnvironment: dev
environments:
  dev:
    projectEndpoint: ${PROJECT_ENDPOINT}
    agentName: crm-campaign-intelligence
    azureContainerRegistry: ${AZURE_CONTAINER_REGISTRY}
    observability:
      applicationInsightsConnectionString: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
      tracingBackend: application-insights
    evaluationSuites:
      - id: crm-campaign-intelligence-smoke
        name: CRM Campaign Intelligence Smoke Evaluation
        tags:
          tier: smoke
          purpose: portal-tracking
          stage: seed
        dataset: crm-campaign-intelligence-eval-seed
        datasetVersion: v1
        datasetFile: .foundry/datasets/crm-campaign-intelligence-eval-seed-v1.jsonl
        evaluators:
          - name: coherence
            threshold: 4
          - name: groundedness
            threshold: 4
