defaultEnvironment: dev
environments:
  dev:
    projectEndpoint: ${PROJECT_ENDPOINT}
    agentName: ecommerce-order-status
    azureContainerRegistry: ${AZURE_CONTAINER_REGISTRY}
    observability:
      applicationInsightsConnectionString: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
      tracingBackend: application-insights
    evaluationSuites:
      - id: ecommerce-order-status-smoke
        name: eCommerce Order Status Smoke Evaluation
        tags:
          tier: smoke
          purpose: portal-tracking
          stage: seed
        dataset: ecommerce-order-status-eval-seed
        datasetVersion: v1
        datasetFile: .foundry/datasets/ecommerce-order-status-eval-seed-v1.jsonl
        evaluators:
          - name: coherence
            threshold: 4
          - name: groundedness
            threshold: 4
