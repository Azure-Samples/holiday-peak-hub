surface:
  type: custom
  classification: Custom Agent
  audience: non-public-internal
  productRuntime: aks
  productTrafficPath: "APIM -> AGC -> AKS"
  foundryManagedCompute: false
  proxy:
    target: existing-aks-apim-endpoint
    endpoint: ${APIM_BASE_URL}/agents/product-management-normalization-classification
defaultEnvironment: dev
environments:
  dev:
    projectEndpoint: ${PROJECT_ENDPOINT}
    agentName: product-management-normalization-classification
    azureContainerRegistry: ${AZURE_CONTAINER_REGISTRY}
    observability:
      applicationInsightsConnectionString: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
      tracingBackend: application-insights
    evaluationSuites:
      - id: product-management-normalization-classification-smoke
        name: Product Management Normalization Classification Smoke Evaluation
        tags:
          tier: smoke
          purpose: portal-tracking
          stage: seed
        dataset: product-management-normalization-classification-eval-seed
        datasetVersion: v1
        datasetFile: .foundry/datasets/product-management-normalization-classification-eval-seed-v1.jsonl
        evaluators:
          - name: coherence
            threshold: 4
          - name: groundedness
            threshold: 4
