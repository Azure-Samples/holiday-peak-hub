---
# Source: holiday-peak-service/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: truth-enrichment
  namespace: holiday-peak-agents
  labels:
    app: truth-enrichment
  annotations:
    azure.workload.identity/client-id: "988def28-0e6b-4a04-ba5b-f93c593ae15b"
---
# Source: holiday-peak-service/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: truth-enrichment-truth-enrichment
  namespace: holiday-peak-agents
  labels:
    app: truth-enrichment
spec:
  selector:
    app: truth-enrichment
    # When canary is disabled, select all pods
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
# Source: holiday-peak-service/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: truth-enrichment-truth-enrichment
  namespace: holiday-peak-agents
  labels:
    app: truth-enrichment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: truth-enrichment
  template:
    metadata:
      labels:
        app: truth-enrichment
        canary: "false"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: truth-enrichment
      nodeSelector:
        agentpool: agents
      tolerations:
        - effect: NoSchedule
          key: workload
          operator: Equal
          value: agents
      containers:
        - name: truth-enrichment
          image: "hph711pocpocacr.azurecr.io/holiday-peak-hub/truth-enrichment-711msft-poc:azd-deploy-1777333153"
          env:
            - name: AI_SEARCH_AUTH_MODE
              value: "managed_identity"
            - name: AI_SEARCH_ENDPOINT
              value: "https://hph711pocpocsearch.search.windows.net"
            - name: AI_SEARCH_INDEX
              value: "catalog-products"
            - name: AI_SEARCH_INDEXER_NAME
              value: "search-enriched-products-indexer"
            - name: AI_SEARCH_VECTOR_INDEX
              value: "product_search_index"
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value: "InstrumentationKey=d2d0301c-6bfd-455a-b02d-8b603ec2e6d3;IngestionEndpoint=https://eastus2-3.in.applicationinsights.azure.com/;LiveEndpoint=https://eastus2.livediagnostics.monitor.azure.com/;ApplicationId=1f417bca-37fe-4846-a244-a8b8e2753174"
            - name: AZURE_CLIENT_ID
              value: "988def28-0e6b-4a04-ba5b-f93c593ae15b"
            - name: BLOB_ACCOUNT_URL
              value: "https://hph711pocpocstore.blob.core.windows.net"
            - name: BLOB_CONTAINER
              value: "agent-memory"
            - name: COSMOS_ACCOUNT_URI
              value: "https://hph711poc-poc-cosmos.documents.azure.com:443/"
            - name: COSMOS_CONTAINER
              value: "agent-memory"
            - name: COSMOS_DATABASE
              value: "holiday-peak-db"
            - name: EMBEDDING_DEPLOYMENT_NAME
              value: "text-embedding-3-large"
            - name: FOUNDRY_AGENT_ID_FAST
              value: "truth-enrichment-fast"
            - name: FOUNDRY_AGENT_ID_RICH
              value: "truth-enrichment-rich"
            - name: FOUNDRY_AGENT_NAME_FAST
              value: "truth-enrichment-fast"
            - name: FOUNDRY_AGENT_NAME_RICH
              value: "truth-enrichment-rich"
            - name: FOUNDRY_AUTO_ENSURE_ON_STARTUP
              value: "true"
            - name: FOUNDRY_STREAM
              value: "true"
            - name: FOUNDRY_STRICT_ENFORCEMENT
              value: "false"
            - name: KEY_VAULT_URI
              value: "https://hph711poc-poc-kv.vault.azure.net/"
            - name: MODEL_DEPLOYMENT_NAME_FAST
              value: "gpt-4-1-nano"
            - name: MODEL_DEPLOYMENT_NAME_RICH
              value: "gpt-4-1"
            - name: OTEL_SERVICE_NAME
              value: "truth-enrichment"
            - name: PLATFORM_JOBS_EVENT_HUB_NAMESPACE
              value: "hph711poc-poc-jobs-eh"
            - name: POSTGRES_AUTH_MODE
              value: "entra"
            - name: POSTGRES_DATABASE
              value: "holiday_peak_crud"
            - name: POSTGRES_HOST
              value: "hph711poc-poc-postgres.postgres.database.azure.com"
            - name: POSTGRES_USER
              value: "hph711poc-poc-crud-identity"
            - name: PROJECT_ENDPOINT
              value: "https://hph711pocpocais.services.ai.azure.com/api/projects/aiphph711bh7"
            - name: PROJECT_NAME
              value: "aiphph711bh7"
            - name: REDIS_HOST
              value: "hph711poc-poc-redis.redis.cache.windows.net"
            - name: REDIS_PASSWORD_SECRET_NAME
              value: "redis-primary-key"
            - name: TRUTH_EVENT_HUB_CONSUMER_GROUP
              value: "enrichment-engine"
            - name: TRUTH_EVENT_HUB_NAME
              value: "enrichment-jobs"
          ports:
            - containerPort: 8000
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
