# Source: holiday-peak-service/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crud-service-crud-service
  namespace: holiday-peak-crud
  labels:
    app: crud-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 100%
      maxSurge: 1
  selector:
    matchLabels:
      app: crud-service
  template:
    metadata:
      labels:
        app: crud-service
        canary: "false"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: crud-service
      nodeSelector:
        agentpool: crud
      tolerations:
        - effect: NoSchedule
          key: workload
          operator: Equal
          value: crud
      initContainers:
        - name: postgres-auth-preflight
          image: "mcr.microsoft.com/azure-cli:azurelinux3.0"
          imagePullPolicy: IfNotPresent
          env:
            - name: AI_SEARCH_AUTH_MODE
              value: "managed_identity"
            - name: AI_SEARCH_ENDPOINT
              value: "https://holidaypeakhub405devsearch.search.windows.net"
            - name: AI_SEARCH_INDEX
              value: "catalog-products"
            - name: AI_SEARCH_INDEXER_NAME
              value: "search-enriched-products-indexer"
            - name: AI_SEARCH_VECTOR_INDEX
              value: "product_search_index"
            - name: AZURE_CLIENT_ID
              value: "b09349cf-547f-409f-8b96-f3288ddedf34"
            - name: AZURE_TENANT_ID
              value: "16b3c013-d300-468d-ac64-7eda0820b6d3"
            - name: BLOB_ACCOUNT_URL
              value: "https://holidaypeakhub405devstor.blob.core.windows.net"
            - name: BLOB_CONTAINER
              value: "agent-memory"
            - name: CATALOG_SEARCH_REQUIRE_AI_SEARCH
              value: "false"
            - name: COSMOS_ACCOUNT_URI
              value: "https://holidaypeakhub405-dev-cosmos.documents.azure.com:443/"
            - name: COSMOS_CONTAINER
              value: "agent-memory"
            - name: COSMOS_DATABASE
              value: "holiday-peak-db"
            - name: EMBEDDING_DEPLOYMENT_NAME
              value: "text-embedding-3-large"
            - name: EVENT_HUB_NAMESPACE
              value: "holidaypeakhub405-dev-eventhub"
            - name: FOUNDRY_STREAM
              value: "true"
            - name: KEY_VAULT_URI
              value: "https://holidaypeakhub405-dev-kv.vault.azure.net/"
            - name: MODEL_DEPLOYMENT_NAME_FAST
              value: "gpt-5-nano"
            - name: MODEL_DEPLOYMENT_NAME_RICH
              value: "gpt-5"
            - name: OTEL_SERVICE_NAME
              value: "crud-service"
            - name: POSTGRES_AUTH_MODE
              value: "password"
            - name: POSTGRES_DATABASE
              value: "holiday_peak_crud"
            - name: POSTGRES_HOST
              value: "holidaypeakhub405-dev-postgres.postgres.database.azure.com"
            - name: POSTGRES_PASSWORD_SECRET_NAME
              value: "postgres-admin-password"
            - name: POSTGRES_USER
              value: "crud_admin"
            - name: PROJECT_ENDPOINT
              value: "https://holidaypeakhub405devais.services.ai.azure.com/api/projects/aipholidaris"
            - name: PROJECT_NAME
              value: "aipholidaris"
            - name: REDIS_HOST
              value: "holidaypeakhub405-dev-redis.redis.cache.windows.net"
            - name: REDIS_PASSWORD_SECRET_NAME
              value: "redis-primary-key"
            - name: WEB_CONCURRENCY
              value: "2"
          resources:
            limits:
              cpu: 250m
              memory: 1Gi
            requests:
              cpu: 50m
              memory: 64Mi
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              MAX_WAIT=60
              echo '{"step":"preflight-start","service":"'"${POSTGRES_USER:-unknown}@${POSTGRES_HOST:-unknown}"'"}'

              install_psql() {
                if command -v psql >/dev/null 2>&1; then
                  return
                fi

                if command -v tdnf >/dev/null 2>&1; then
                  if ! tdnf install -y postgresql >/dev/null 2>&1; then
                    echo '{"step":"preflight","status":"error","error":"psql_install_failed","packageManager":"tdnf","package":"postgresql"}'
                    exit 1
                  fi
                elif command -v apk >/dev/null 2>&1; then
                  if ! apk add --no-cache postgresql-client >/dev/null 2>&1; then
                    echo '{"step":"preflight","status":"error","error":"psql_install_failed","packageManager":"apk","package":"postgresql-client"}'
                    exit 1
                  fi
                else
                  echo '{"step":"preflight","status":"error","error":"unsupported_package_manager","detail":"psql is missing and neither tdnf nor apk is available"}'
                  exit 1
                fi

                if ! command -v psql >/dev/null 2>&1; then
                  echo '{"step":"preflight","status":"error","error":"psql_missing_after_install"}'
                  exit 1
                fi
              }

              install_psql

              if [ -z "${KEY_VAULT_URI:-}" ] || [ -z "${POSTGRES_PASSWORD_SECRET_NAME:-}" ]; then
                echo '{"step":"preflight","status":"skipped","detail":"KEY_VAULT_URI or POSTGRES_PASSWORD_SECRET_NAME not set"}'
                exit 0
              fi

              # Login using workload identity (federated token supplied by AKS).
              az login --federated-token "$(cat ${AZURE_FEDERATED_TOKEN_FILE})" \
                --service-principal \
                --username "${AZURE_CLIENT_ID}" \
                --tenant "${AZURE_TENANT_ID}" >/dev/null

              VAULT_NAME="$(printf '%s' "${KEY_VAULT_URI}" | sed -E 's#https?://([^.]+).*#\1#')"
              PG_PASSWORD="$(az keyvault secret show \
                --vault-name "${VAULT_NAME}" \
                --name "${POSTGRES_PASSWORD_SECRET_NAME}" \
                --query value -o tsv)"
              if [ -z "${PG_PASSWORD}" ]; then
                echo '{"step":"preflight","status":"error","detail":"empty_secret"}'
                exit 1
              fi

              SSL_MODE="require"
              if [ "${POSTGRES_SSL:-true}" = "false" ]; then SSL_MODE="disable"; fi
              DSN="host=${POSTGRES_HOST} port=${POSTGRES_PORT:-5432} dbname=${POSTGRES_DATABASE:-postgres} user=${POSTGRES_USER} sslmode=${SSL_MODE} connect_timeout=10"

              attempt=0
              delay=1
              elapsed=0
              last_err=""
              while :; do
                attempt=$((attempt + 1))
                set +e
                OUT=$(PGPASSWORD="${PG_PASSWORD}" psql "${DSN}" -v ON_ERROR_STOP=1 -At -c "SELECT 1;" 2>&1)
                RC=$?
                set -e
                if [ "${RC}" = "0" ]; then
                  echo '{"step":"preflight","status":"ok","attempt":"'"${attempt}"'"}'
                  exit 0
                fi
                last_err="${OUT}"
                if echo "${OUT}" | grep -qiE 'password authentication failed|invalidpassword'; then
                  echo '{"step":"preflight","status":"error","error":"invalid_password","attempt":"'"${attempt}"'"}'
                  exit 1
                fi
                if [ "${elapsed}" -ge "${MAX_WAIT}" ] || [ "${attempt}" -ge 10 ]; then
                  break
                fi
                echo '{"step":"preflight","status":"retry","attempt":"'"${attempt}"'","delaySeconds":"'"${delay}"'"}'
                sleep "${delay}"
                elapsed=$((elapsed + delay))
                delay=$((delay * 2))
                if [ "${delay}" -gt 30 ]; then delay=30; fi
              done

              ESCAPED=$(printf '%s' "${last_err}" | tr '\n' ' ' | sed 's/"/\\"/g')
              echo '{"step":"preflight","status":"error","error":"unreachable","attempt":"'"${attempt}"'","detail":"'"${ESCAPED}"'"}'
              exit 1
      containers:
        - name: crud-service
          image: "holidaypeakhub405devacr.azurecr.io/crud-service@sha256:42625011b88c82555b8c3d4f47872113cdea4e4fbc219bed0cb58940cca6608c"
          env:
            - name: ROOT_PATH
              value: "/health"
            - name: AI_SEARCH_AUTH_MODE
              value: "managed_identity"
            - name: AI_SEARCH_ENDPOINT
              value: "https://holidaypeakhub405devsearch.search.windows.net"
            - name: AI_SEARCH_INDEX
              value: "catalog-products"
            - name: AI_SEARCH_INDEXER_NAME
              value: "search-enriched-products-indexer"
            - name: AI_SEARCH_VECTOR_INDEX
              value: "product_search_index"
            - name: AZURE_CLIENT_ID
              value: "b09349cf-547f-409f-8b96-f3288ddedf34"
            - name: AZURE_TENANT_ID
              value: "16b3c013-d300-468d-ac64-7eda0820b6d3"
            - name: BLOB_ACCOUNT_URL
              value: "https://holidaypeakhub405devstor.blob.core.windows.net"
            - name: BLOB_CONTAINER
              value: "agent-memory"
            - name: CATALOG_SEARCH_REQUIRE_AI_SEARCH
              value: "false"
            - name: COSMOS_ACCOUNT_URI
              value: "https://holidaypeakhub405-dev-cosmos.documents.azure.com:443/"
            - name: COSMOS_CONTAINER
              value: "agent-memory"
            - name: COSMOS_DATABASE
              value: "holiday-peak-db"
            - name: EMBEDDING_DEPLOYMENT_NAME
              value: "text-embedding-3-large"
            - name: EVENT_HUB_NAMESPACE
              value: "holidaypeakhub405-dev-eventhub"
            - name: FOUNDRY_STREAM
              value: "true"
            - name: KEY_VAULT_URI
              value: "https://holidaypeakhub405-dev-kv.vault.azure.net/"
            - name: MODEL_DEPLOYMENT_NAME_FAST
              value: "gpt-5-nano"
            - name: MODEL_DEPLOYMENT_NAME_RICH
              value: "gpt-5"
            - name: OTEL_SERVICE_NAME
              value: "crud-service"
            - name: POSTGRES_AUTH_MODE
              value: "password"
            - name: POSTGRES_DATABASE
              value: "holiday_peak_crud"
            - name: POSTGRES_HOST
              value: "holidaypeakhub405-dev-postgres.postgres.database.azure.com"
            - name: POSTGRES_PASSWORD_SECRET_NAME
              value: "postgres-admin-password"
            - name: POSTGRES_USER
              value: "crud_admin"
            - name: PROJECT_ENDPOINT
              value: "https://holidaypeakhub405devais.services.ai.azure.com/api/projects/aipholidaris"
            - name: PROJECT_NAME
              value: "aipholidaris"
            - name: REDIS_HOST
              value: "holidaypeakhub405-dev-redis.redis.cache.windows.net"
            - name: REDIS_PASSWORD_SECRET_NAME
              value: "redis-primary-key"
            - name: WEB_CONCURRENCY
              value: "2"
          ports:
            - containerPort: 8000
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
---
# Source: holiday-peak-service/templates/agc-routing.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crud-service-crud-service-agc
  namespace: holiday-peak-crud
  labels:
    app: crud-service
spec:
  parentRefs:
    - name: "holiday-peak-agc"
      namespace: "holiday-peak-crud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/health"
      backendRefs:
        - name: crud-service-crud-service
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: "/api"
      backendRefs:
        - name: crud-service-crud-service
          port: 80
