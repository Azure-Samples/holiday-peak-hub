apiVersion: v1
kind: ServiceAccount
metadata:
  name: crud-service
  namespace: holiday-peak-crud
  labels:
    app: crud-service
  annotations:
    azure.workload.identity/client-id: "b09349cf-547f-409f-8b96-f3288ddedf34"
---
# Source: holiday-peak-service/templates/service.yaml
