{{- $primaryImage := ternary (printf "%s@%s" .Values.image.repository .Values.image.digest) (printf "%s:%s" .Values.image.repository (.Values.image.tag | default "latest")) (ne (.Values.image.digest | default "") "") -}}
{{- $canaryRepository := .Values.canary.image.repository | default .Values.image.repository -}}
{{- $canaryTag := .Values.canary.image.tag | default .Values.image.tag -}}
{{- $canaryDigest := .Values.canary.image.digest | default .Values.image.digest -}}
{{- $canaryImage := ternary (printf "%s@%s" $canaryRepository $canaryDigest) (printf "%s:%s" $canaryRepository ($canaryTag | default "latest")) (ne ($canaryDigest | default "") "") -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "holiday-peak-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.serviceName }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.availability.strategy }}
  strategy:
    type: {{ .Values.availability.strategy.type | default "RollingUpdate" }}
    {{- if and (eq (.Values.availability.strategy.type | default "RollingUpdate") "RollingUpdate") .Values.availability.rollingUpdate }}
    rollingUpdate:
      maxUnavailable: {{ .Values.availability.rollingUpdate.maxUnavailable | default "25%" }}
      maxSurge: {{ .Values.availability.rollingUpdate.maxSurge | default "25%" }}
    {{- end }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.serviceName }}
      {{- if .Values.deployment.selectorIncludeCanary }}
      canary: "false"
      {{- end }}
  template:
    metadata:
      labels:
        app: {{ .Values.serviceName }}
        canary: "false"
        {{- if .Values.serviceAccount.clientId }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceName }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.availability.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        {{- range .Values.availability.topologySpreadConstraints.constraints }}
        - maxSkew: {{ .maxSkew | default 1 }}
          topologyKey: {{ .topologyKey | default "topology.kubernetes.io/zone" | quote }}
          whenUnsatisfiable: {{ .whenUnsatisfiable | default "ScheduleAnyway" | quote }}
          labelSelector:
            matchLabels:
              app: {{ $.Values.serviceName }}
        {{- end }}
      {{- end }}
      {{- if .Values.availability.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: {{ .Values.serviceName }}
              topologyKey: {{ .Values.availability.podAntiAffinity.topologyKey | default "kubernetes.io/hostname" | quote }}
      {{- end }}
      {{- if .Values.preflight.postgresAuth.enabled }}
      initContainers:
        - name: postgres-auth-preflight
          image: {{ .Values.preflight.postgresAuth.image | quote }}
          imagePullPolicy: IfNotPresent
          {{- if .Values.env }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.preflight.postgresAuth.resources | nindent 12 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              MAX_WAIT={{ .Values.preflight.postgresAuth.maxWaitSeconds | default 60 }}
              echo '{"step":"preflight-start","service":"'"${POSTGRES_USER:-unknown}@${POSTGRES_HOST:-unknown}"'"}'

              # Install psql and jq if missing (azure-cli image is Alpine-based).
              if ! command -v psql >/dev/null 2>&1; then
                apk add --no-cache postgresql-client >/dev/null
              fi
              if ! command -v jq >/dev/null 2>&1; then
                apk add --no-cache jq >/dev/null
              fi

              if [ -z "${KEY_VAULT_URI:-}" ] || [ -z "${POSTGRES_PASSWORD_SECRET_NAME:-}" ]; then
                echo '{"step":"preflight","status":"skipped","detail":"KEY_VAULT_URI or POSTGRES_PASSWORD_SECRET_NAME not set"}'
                exit 0
              fi

              # Login using workload identity (federated token supplied by AKS).
              az login --federated-token "$(cat ${AZURE_FEDERATED_TOKEN_FILE})" \
                --service-principal \
                --username "${AZURE_CLIENT_ID}" \
                --tenant "${AZURE_TENANT_ID}" >/dev/null

              VAULT_NAME="$(printf '%s' "${KEY_VAULT_URI}" | sed -E 's#https?://([^.]+).*#\1#')"
              PG_PASSWORD="$(az keyvault secret show \
                --vault-name "${VAULT_NAME}" \
                --name "${POSTGRES_PASSWORD_SECRET_NAME}" \
                --query value -o tsv)"
              if [ -z "${PG_PASSWORD}" ]; then
                echo '{"step":"preflight","status":"error","detail":"empty_secret"}'
                exit 1
              fi

              SSL_MODE="require"
              if [ "${POSTGRES_SSL:-true}" = "false" ]; then SSL_MODE="disable"; fi
              DSN="host=${POSTGRES_HOST} port=${POSTGRES_PORT:-5432} dbname=${POSTGRES_DATABASE:-postgres} user=${POSTGRES_USER} sslmode=${SSL_MODE} connect_timeout=10"

              attempt=0
              delay=1
              elapsed=0
              last_err=""
              while :; do
                attempt=$((attempt + 1))
                set +e
                OUT=$(PGPASSWORD="${PG_PASSWORD}" psql "${DSN}" -v ON_ERROR_STOP=1 -At -c "SELECT 1;" 2>&1)
                RC=$?
                set -e
                if [ "${RC}" = "0" ]; then
                  echo '{"step":"preflight","status":"ok","attempt":"'"${attempt}"'"}'
                  exit 0
                fi
                last_err="${OUT}"
                if echo "${OUT}" | grep -qiE 'password authentication failed|invalidpassword'; then
                  echo '{"step":"preflight","status":"error","error":"invalid_password","attempt":"'"${attempt}"'"}'
                  exit 1
                fi
                if [ "${elapsed}" -ge "${MAX_WAIT}" ] || [ "${attempt}" -ge 10 ]; then
                  break
                fi
                echo '{"step":"preflight","status":"retry","attempt":"'"${attempt}"'","delaySeconds":"'"${delay}"'"}'
                sleep "${delay}"
                elapsed=$((elapsed + delay))
                delay=$((delay * 2))
                if [ "${delay}" -gt 30 ]; then delay=30; fi
              done

              ESCAPED=$(printf '%s' "${last_err}" | tr '\n' ' ' | sed 's/"/\\"/g')
              echo '{"step":"preflight","status":"error","error":"unreachable","attempt":"'"${attempt}"'","detail":"'"${ESCAPED}"'"}'
              exit 1
      {{- end }}
      containers:
        - name: {{ .Values.serviceName }}
          image: "{{ $primaryImage }}"
          {{- if .Values.container.command }}
          command:
            {{- toYaml .Values.container.command | nindent 12 }}
          {{- end }}
          {{- if .Values.container.args }}
          args:
            {{- toYaml .Values.container.args | nindent 12 }}
          {{- end }}
          env:
            {{- if and .Values.agc.enabled .Values.agc.paths (not (hasKey (.Values.env | default dict) "ROOT_PATH")) }}
            - name: ROOT_PATH
              value: {{ (index .Values.agc.paths 0).path | quote }}
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          ports:
            - containerPort: 8000
          {{- if .Values.probes.startup }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path | default "/health" }}
              port: 8000
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold | default 30 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path | default "/ready" }}
              port: 8000
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds | default 5 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: 8000
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds | default 5 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

---
{{- if .Values.canary.enabled }}
# Canary deployment for progressive rollout
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "holiday-peak-service.fullname" . }}-canary
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.serviceName }}
    canary: "true"
spec:
  replicas: {{ .Values.canary.replicaCount | default 1 }}
  {{- if .Values.availability.strategy }}
  strategy:
    type: {{ .Values.availability.strategy.type | default "RollingUpdate" }}
    {{- if and (eq (.Values.availability.strategy.type | default "RollingUpdate") "RollingUpdate") .Values.availability.rollingUpdate }}
    rollingUpdate:
      maxUnavailable: {{ .Values.availability.rollingUpdate.maxUnavailable | default "25%" }}
      maxSurge: {{ .Values.availability.rollingUpdate.maxSurge | default "25%" }}
    {{- end }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.serviceName }}
      canary: "true"
  template:
    metadata:
      labels:
        app: {{ .Values.serviceName }}
        canary: "true"
        {{- if .Values.serviceAccount.clientId }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceName }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.availability.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        {{- range .Values.availability.topologySpreadConstraints.constraints }}
        - maxSkew: {{ .maxSkew | default 1 }}
          topologyKey: {{ .topologyKey | default "topology.kubernetes.io/zone" | quote }}
          whenUnsatisfiable: {{ .whenUnsatisfiable | default "ScheduleAnyway" | quote }}
          labelSelector:
            matchLabels:
              app: {{ $.Values.serviceName }}
              canary: "true"
        {{- end }}
      {{- end }}
      {{- if .Values.availability.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: {{ .Values.serviceName }}
                  canary: "true"
              topologyKey: {{ .Values.availability.podAntiAffinity.topologyKey | default "kubernetes.io/hostname" | quote }}
      {{- end }}
      containers:
        - name: {{ .Values.serviceName }}
          image: "{{ $canaryImage }}"
          env:
            {{- if and .Values.agc.enabled .Values.agc.paths (not (hasKey (.Values.env | default dict) "ROOT_PATH")) }}
            - name: ROOT_PATH
              value: {{ (index .Values.agc.paths 0).path | quote }}
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          ports:
            - containerPort: 8000
          {{- if .Values.probes.startup }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path | default "/health" }}
              port: 8000
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold | default 30 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path | default "/ready" }}
              port: 8000
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds | default 5 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: 8000
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds | default 5 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
