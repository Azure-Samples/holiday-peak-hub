name: test

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - lib/**
      - apps/**
      - tests/**
      - pyproject.toml
      - conftest.py
      - .github/workflows/test.yml
      - .github/workflows/lint.yml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install lib
        run: uv pip install --system -e ./lib/src
      - name: Install test dependencies
        run: uv pip install --system pytest pytest-cov pytest-asyncio httpx requests pip-audit
      - name: Install apps
        run: |
          set -e
          for d in apps/*/src; do
            if [ -f "$d/pyproject.toml" ]; then
              uv pip install --system -e "$d"
            else
              echo "Skipping $d (no pyproject.toml)"
            fi
          done
      - name: Re-install lib (restore editable after app overrides)
        run: uv pip install --system -e ./lib/src
      - name: Verify core imports
        run: |
          python -c "
          import traceback, sys
          try:
              from agent_framework import BaseAgent
              print(f'OK: BaseAgent={BaseAgent}')
          except Exception:
              traceback.print_exc()
              print('---')
              # Show what is actually in the module
              try:
                  import agent_framework
                  print(f'agent_framework.__file__={agent_framework.__file__}')
                  print(f'dir={[x for x in dir(agent_framework) if not x.startswith(\"_\")]}')
              except Exception:
                  traceback.print_exc()
              sys.exit(1)
          "
      - name: Run lib tests with coverage
        working-directory: lib
        run: |
          pytest tests/ --maxfail=1 --cov=src --cov-report=xml:../coverage-lib.xml --cov-fail-under=75 --junitxml=../test-results-lib.xml
      - name: Self-healing quality gate
        working-directory: lib
        run: |
          echo "::group::Self-healing contract tests"
          pytest tests/test_self_healing_core.py \
                 tests/test_self_healing_apim_strategy.py \
                 tests/test_self_healing_aks_strategy.py \
                 tests/test_self_healing_messaging_strategy.py \
                 tests/test_self_healing_verification_escalation.py \
                 -v --tb=short --junitxml=../test-results-self-healing.xml
          echo "::endgroup::"
      - name: Run app tests
        run: |
          pytest apps/*/tests --ignore=apps/ui/tests --cov=apps --cov-report=xml:coverage-apps.xml --cov-fail-under=60 --junitxml=test-results-apps.xml
      - name: Run e2e tests
        run: |
          pytest tests/e2e -m e2e --maxfail=1
      - name: Run Python dependency vulnerability audit
        run: |
          python -m pip_audit --skip-editable --progress-spinner off --ignore-vuln CVE-2024-23342 || true
      - name: Upload Python test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: |
            test-results-lib.xml
            test-results-apps.xml
            test-results-self-healing.xml
            coverage-lib.xml
            coverage-apps.xml
      - name: Publish Python test summary
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: dorny/test-reporter@v2
        with:
          name: Python Tests
          path: test-results-*.xml
          reporter: java-junit

  ui-quality:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CRUD_API_URL: http://localhost:8000
    defaults:
      run:
        working-directory: apps/ui
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: apps/ui/yarn.lock
      - name: Install UI dependencies
        run: yarn install --frozen-lockfile
      - name: Run UI lint
        run: yarn lint
      - name: Run UI type-check
        run: yarn type-check
      - name: Run UI unit tests
        run: yarn test --ci --coverage --forceExit
      - name: Install Playwright browser
        run: yarn playwright install --with-deps chromium
      - name: Run UI E2E smoke tests
        run: yarn test:e2e:ci --grep "critical flows baseline"
      - name: Run UI dependency vulnerability audit
        run: |
          yarn audit --json > yarn-audit.json || true
          node -e "const fs=require('fs'); const lines=fs.readFileSync('yarn-audit.json','utf8').split(/\r?\n/).filter(Boolean); let high=0,critical=0; for (const line of lines){ try{const obj=JSON.parse(line); if(obj.type==='auditAdvisory'){const sev=(obj.data.advisory.severity||'').toLowerCase(); if(sev==='high') high++; if(sev==='critical') critical++; }}catch(_){} } console.log('Yarn advisories => high='+high+', critical='+critical); process.exit(critical>0?1:0);"
      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: |
            apps/ui/coverage/**
            apps/ui/test-results/**
            apps/ui/playwright-report/**
