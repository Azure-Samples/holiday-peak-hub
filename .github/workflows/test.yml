name: test

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - lib/**
      - apps/**
      - pyproject.toml
      - conftest.py
      - .github/workflows/test.yml
      - .github/workflows/lint.yml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install lib
        run: uv pip install --system -e ./lib/src
      - name: Install test dependencies
        run: uv pip install --system pytest pytest-cov pytest-asyncio httpx requests
      - name: Install apps
        run: |
          set -e
          for d in apps/*/src; do
            if [ -f "$d/pyproject.toml" ]; then
              uv pip install --system -e "$d"
            else
              echo "Skipping $d (no pyproject.toml)"
            fi
          done
      - name: Run lib tests with coverage
        working-directory: lib
        run: |
          pytest tests/ --maxfail=1
      - name: Run app tests
        run: |
          pytest apps/*/tests --ignore=apps/ui/tests
