name: deploy-azd-prod (entrypoint)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ startsWith(github.ref_name, 'v') && !contains(github.ref_name, '-') }}
    uses: ./.github/workflows/deploy-azd.yml
    with:
      environment: prod
      location: centralus
      projectName: holidaypeakhub405
      imageTag: ${{ github.ref_name }}
      deployStatic: true
      uiOnly: false
      apiBaseUrl: ''
      seedDemoData: false
      deployChangedOnly: true
      forceApimSync: true
      autoAllowAcrRunnerIp: false
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      SWA_DEPLOYMENT_TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
