name: agent-eval-continuous

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  monitor:
    name: monitor eval drift (${{ matrix.agent }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent:
          - ecommerce-catalog-search
          - search-enrichment-agent
          - truth-enrichment
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install evaluation runtime
        run: uv pip install --system -e ./lib/src
      - name: Run continuous evaluation
        id: eval
        shell: bash
        run: |
          set +e
          python scripts/ci/run_agent_evaluation.py \
            --agent-root "apps/${{ matrix.agent }}" \
            --run-name "continuous-${{ github.run_id }}-${{ matrix.agent }}" \
            --write-result ".foundry-results/${{ matrix.agent }}.json" \
            --fail-on-drift
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Open drift issue
        if: steps.eval.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const agent = '${{ matrix.agent }}';
            const body = [
              `Continuous evaluation detected quality drift for ${agent}.`,
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Review the evaluation result artifact and decide whether prompt, model, data, or runtime changes are required.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[drift] ${agent}: continuous evaluation quality drift`,
              body,
              labels: ['evaluation', 'monitoring']
            });
      - name: Upload evaluation result
        uses: actions/upload-artifact@v4
        with:
          name: continuous-eval-${{ matrix.agent }}
          path: .foundry-results/${{ matrix.agent }}.json
