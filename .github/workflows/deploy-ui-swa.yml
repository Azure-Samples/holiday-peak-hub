name: deploy-ui-swa

on:
  push:
    branches:
      - '**'
    paths:
      - apps/ui/**
      - lib/**
      - azure.yaml
      - .infra/**
      - .github/workflows/deploy-ui-swa.yml
  workflow_dispatch:
    inputs:
      environment:
        description: Target GitHub environment
        required: true
        default: dev
      projectName:
        description: Project prefix used by naming convention
        required: true
        default: holidaypeakhub405
      sourceSha:
        description: Optional source commit SHA to deploy for the UI build
        required: false
        default: ''
      sourceRef:
        description: Optional source ref to deploy for the UI build when sourceSha is empty
        required: false
        default: ''
      apiUrl:
        description: Optional API base URL override (must match APIM gateway URL for drift safety)
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-ui-swa-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy-ui:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
      DEPLOY_PROJECT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.projectName || 'holidaypeakhub405' }}
      DEPLOY_API_URL_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.apiUrl || '' }}
      DEPLOY_SOURCE_CHECKOUT_REF: ${{ inputs.sourceSha != '' && inputs.sourceSha || (inputs.sourceRef != '' && inputs.sourceRef || github.ref) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SOURCE_CHECKOUT_REF }}

      - name: Enforce environment policy
        shell: bash
        run: |
          set -euo pipefail

          TARGET_ENV="${DEPLOY_ENVIRONMENT}"
          if [ "$TARGET_ENV" = "prod" ]; then
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "Push-triggered UI deployments are restricted to dev." >&2
              exit 1
            fi

            if [ "${GITHUB_REF}" != "refs/heads/main" ] && [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
              echo "Manual prod UI deployments must start from main or an approved release tag." >&2
              exit 1
            fi
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve and validate API URL
        id: api
        shell: bash
        run: |
          set -euo pipefail

          RESOURCE_GROUP="${DEPLOY_PROJECT_NAME}-${DEPLOY_ENVIRONMENT}-rg"

          APIM_URL=$(az apim show \
            --name "${DEPLOY_PROJECT_NAME}-${DEPLOY_ENVIRONMENT}-apim" \
            --resource-group "$RESOURCE_GROUP" \
            --query "gatewayUrl" -o tsv)

          APIM_URL="$(echo "$APIM_URL" | xargs)"
          APIM_URL="${APIM_URL%/}"

          if [ -z "$APIM_URL" ]; then
            echo "Failed to resolve APIM gateway URL for environment '${DEPLOY_ENVIRONMENT}'." >&2
            exit 1
          fi

          RESOLVED_API_URL="$APIM_URL"

          if [ -n "${DEPLOY_API_URL_OVERRIDE}" ]; then
            OVERRIDE_API_URL="$(echo "${DEPLOY_API_URL_OVERRIDE}" | xargs)"
            OVERRIDE_API_URL="${OVERRIDE_API_URL%/}"

            if [ "$OVERRIDE_API_URL" != "$APIM_URL" ]; then
              echo "apiUrl override drift detected. Provided URL does not match live APIM gateway URL." >&2
              echo "Provided: $OVERRIDE_API_URL" >&2
              echo "Expected: $APIM_URL" >&2
              exit 1
            fi

            RESOLVED_API_URL="$OVERRIDE_API_URL"
          fi

          if [ -z "$RESOLVED_API_URL" ]; then
            echo "Could not resolve API URL from APIM." >&2
            exit 1
          fi

          echo "api_url=$RESOLVED_API_URL" >> "$GITHUB_OUTPUT"
          echo "crud_api_url=$RESOLVED_API_URL" >> "$GITHUB_OUTPUT"
          echo "agent_api_url=${RESOLVED_API_URL}/agents" >> "$GITHUB_OUTPUT"

      - name: Smoke test APIM health before UI deploy
        shell: bash
        run: |
          set -euo pipefail

          API_BASE_URL="${{ steps.api.outputs.api_url }}"
          API_BASE_URL="${API_BASE_URL%/}"

          smoke_endpoint() {
            local url="$1"
            local label="$2"
            local status_code=""
            if ! status_code=$(curl -sS -o /tmp/ui-only-api-health.json -w "%{http_code}" "$url"); then
              echo "$label check failed before UI deployment due to transport error at $url" >&2
              cat /tmp/ui-only-api-health.json 2>/dev/null || true
              exit 1
            fi
            STATUS_CODE="$status_code"
            if [ "$STATUS_CODE" != "200" ]; then
              echo "$label check failed before UI deployment with HTTP $STATUS_CODE at $url" >&2
              cat /tmp/ui-only-api-health.json 2>/dev/null || true
              exit 1
            fi
          }

          smoke_endpoint "${API_BASE_URL}/api/health" "APIM health"
          smoke_endpoint "${API_BASE_URL}/api/products?limit=1" "Products"
          smoke_endpoint "${API_BASE_URL}/api/categories" "Categories"

      - name: Resolve SWA deployment token
        id: swa
        shell: bash
        run: |
          set -euo pipefail

          RESOURCE_GROUP="${DEPLOY_PROJECT_NAME}-${DEPLOY_ENVIRONMENT}-rg"
          SWA_NAME="${DEPLOY_PROJECT_NAME}-ui-${DEPLOY_ENVIRONMENT}"

          mapfile -t AZD_UI_SWAS < <(az resource list \
            --resource-group "$RESOURCE_GROUP" \
            --resource-type Microsoft.Web/staticSites \
            --query "[?tags.\"azd-service-name\"=='ui'].name" -o tsv)

          if [ "${#AZD_UI_SWAS[@]}" -ne 1 ] || [ "${AZD_UI_SWAS[0]}" != "$SWA_NAME" ]; then
            echo "UI resource ownership contract violation in $RESOURCE_GROUP." >&2
            echo "Expected exactly one azd-owned SWA named $SWA_NAME." >&2
            echo "Found: ${AZD_UI_SWAS[*]:-<none>}" >&2
            exit 1
          fi

          az staticwebapp show --name "$SWA_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null

          SWA_TOKEN=$(az staticwebapp secrets list \
            --name "$SWA_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.apiKey" -o tsv)

          SWA_TOKEN="$(echo "$SWA_TOKEN" | xargs)"
          if [ -z "$SWA_TOKEN" ]; then
            echo "Failed to resolve deployment token for canonical SWA $SWA_NAME in $RESOURCE_GROUP." >&2
            exit 1
          fi

          echo "::add-mask::$SWA_TOKEN"
          echo "swa_name=$SWA_NAME" >> "$GITHUB_OUTPUT"
          echo "swa_token=$SWA_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy UI to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: upload
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.swa_token }}
          app_location: apps/ui
          output_location: ''
          skip_api_build: true
          app_build_command: yarn install --frozen-lockfile && yarn build
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.api.outputs.api_url }}
          NEXT_PUBLIC_CRUD_API_URL: ${{ steps.api.outputs.crud_api_url }}
          NEXT_PUBLIC_AGENT_API_URL: ${{ steps.api.outputs.agent_api_url }}
          NEXT_PUBLIC_DEV_AUTH_MOCK: ${{ env.DEPLOY_ENVIRONMENT == 'dev' && 'true' || vars.NEXT_PUBLIC_DEV_AUTH_MOCK }}
          NEXT_PUBLIC_DEV_AUTH_MOCK_ALLOW_PROD: ${{ env.DEPLOY_ENVIRONMENT == 'dev' && 'false' || vars.NEXT_PUBLIC_DEV_AUTH_MOCK_ALLOW_PROD }}
          NEXT_PUBLIC_ENTRA_CLIENT_ID: ${{ vars.NEXT_PUBLIC_ENTRA_CLIENT_ID }}
          NEXT_PUBLIC_ENTRA_TENANT_ID: ${{ vars.NEXT_PUBLIC_ENTRA_TENANT_ID }}

      - name: Smoke test UI host and API health after deploy
        shell: bash
        run: |
          set -euo pipefail

          RESOURCE_GROUP="${DEPLOY_PROJECT_NAME}-${DEPLOY_ENVIRONMENT}-rg"
          SWA_NAME="${{ steps.swa.outputs.swa_name }}"

          SWA_HOSTNAME=$(az staticwebapp show \
            --name "$SWA_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "defaultHostname" -o tsv)

          SWA_HOSTNAME="$(echo "$SWA_HOSTNAME" | xargs)"
          if [ -z "$SWA_HOSTNAME" ]; then
            echo "Could not resolve Static Web App hostname for $SWA_NAME." >&2
            exit 1
          fi

          UI_URL="https://$SWA_HOSTNAME"
          if ! STATUS_CODE=$(curl -sS -o /tmp/ui-only-homepage.html -w "%{http_code}" "$UI_URL"); then
            echo "UI smoke test failed due to transport error at $UI_URL" >&2
            exit 1
          fi
          if [ "$STATUS_CODE" != "200" ]; then
            echo "UI smoke test failed with HTTP $STATUS_CODE at $UI_URL" >&2
            exit 1
          fi

          HEALTH_URL="${{ steps.api.outputs.api_url }}/api/health"
          if ! STATUS_CODE=$(curl -sS -o /tmp/ui-only-api-health-post.json -w "%{http_code}" "$HEALTH_URL"); then
            echo "API health check failed after UI deployment due to transport error at $HEALTH_URL" >&2
            cat /tmp/ui-only-api-health-post.json 2>/dev/null || true
            exit 1
          fi
          if [ "$STATUS_CODE" != "200" ]; then
            echo "API health check failed after UI deployment with HTTP $STATUS_CODE at $HEALTH_URL" >&2
            cat /tmp/ui-only-api-health-post.json 2>/dev/null || true
            exit 1
          fi

          PRODUCTS_URL="${{ steps.api.outputs.api_url }}/api/products?limit=1"
          if ! STATUS_CODE=$(curl -sS -o /tmp/ui-only-api-products-post.json -w "%{http_code}" "$PRODUCTS_URL"); then
            echo "Products smoke check failed after UI deployment due to transport error at $PRODUCTS_URL" >&2
            cat /tmp/ui-only-api-products-post.json 2>/dev/null || true
            exit 1
          fi
          if [ "$STATUS_CODE" != "200" ]; then
            echo "Products smoke check failed after UI deployment with HTTP $STATUS_CODE at $PRODUCTS_URL" >&2
            cat /tmp/ui-only-api-products-post.json 2>/dev/null || true
            exit 1
          fi

          CATEGORIES_URL="${{ steps.api.outputs.api_url }}/api/categories"
          if ! STATUS_CODE=$(curl -sS -o /tmp/ui-only-api-categories-post.json -w "%{http_code}" "$CATEGORIES_URL"); then
            echo "Categories smoke check failed after UI deployment due to transport error at $CATEGORIES_URL" >&2
            cat /tmp/ui-only-api-categories-post.json 2>/dev/null || true
            exit 1
          fi
          if [ "$STATUS_CODE" != "200" ]; then
            echo "Categories smoke check failed after UI deployment with HTTP $STATUS_CODE at $CATEGORIES_URL" >&2
            cat /tmp/ui-only-api-categories-post.json 2>/dev/null || true
            exit 1
          fi
