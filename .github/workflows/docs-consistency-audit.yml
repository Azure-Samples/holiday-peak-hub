name: docs-consistency-audit

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
  schedule:
    # Mondays 11:00 UTC — runs after governance-audit (09:00) and security-triage-report (10:00).
    - cron: '0 11 * * 1'

concurrency:
  group: docs-consistency-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Audit documentation consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run documentation consistency audit
        id: audit
        run: |
          set +e
          python scripts/ops/audit_docs_consistency.py \
            --format markdown \
            --output .tmp/docs-audit.md
          status=$?
          set -e
          mkdir -p .tmp
          echo "status=${status}" >> "$GITHUB_OUTPUT"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-consistency-audit-report
          path: .tmp/docs-audit.md
          if-no-files-found: warn
          retention-days: 30

      - name: Open or update tracking issue on drift
        if: steps.audit.outputs.status != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          report_body=$(cat .tmp/docs-audit.md)
          title="Documentation drift detected — weekly audit ($(date -u +%Y-%m-%d))"

          # Find an open tracking issue from a previous run (label-scoped).
          existing=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "documentation,drift,automated-audit" \
            --json number \
            --jq '.[0].number // empty')

          # Prepare body with run link.
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo "${report_body}"
            echo
            echo "---"
            echo "Generated by ${run_url}"
          } > .tmp/issue-body.md

          if [ -n "${existing}" ]; then
            echo "Updating existing issue #${existing}"
            gh issue comment "${existing}" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file .tmp/issue-body.md
          else
            echo "Opening new tracking issue"
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "${title}" \
              --label "documentation" \
              --label "drift" \
              --label "automated-audit" \
              --body-file .tmp/issue-body.md
          fi

      - name: Close tracking issue when no drift remains
        if: steps.audit.outputs.status == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          existing=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "documentation,drift,automated-audit" \
            --json number \
            --jq '.[].number')
          if [ -z "${existing}" ]; then
            echo "No open drift issue to close."
            exit 0
          fi
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          for n in ${existing}; do
            echo "Closing #${n} — drift resolved by ${run_url}"
            gh issue comment "${n}" \
              --repo "$GITHUB_REPOSITORY" \
              --body "Documentation drift resolved as of ${run_url}. Closing automatically."
            gh issue close "${n}" --repo "$GITHUB_REPOSITORY"
          done

      - name: Surface audit result in workflow summary
        if: always()
        run: |
          {
            echo "## Documentation Consistency Audit"
            echo
            if [ "${{ steps.audit.outputs.status }}" = "0" ]; then
              echo "✅ No drift detected."
            else
              echo "⚠️  Drift detected — see auto-filed tracking issue."
            fi
            echo
            cat .tmp/docs-audit.md || true
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job when drift is detected
        if: steps.audit.outputs.status != '0'
        run: |
          echo "Documentation drift detected. See workflow summary and tracking issue." >&2
          exit 1
