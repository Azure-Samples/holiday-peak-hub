name: governance-audit

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  audit-main-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Audit PR-only protections for main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/ops/audit_main_governance.py --repo "$GITHUB_REPOSITORY" --required-check lint --required-check test
